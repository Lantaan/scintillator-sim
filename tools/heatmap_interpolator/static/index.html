<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heatmap Interpolator</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #182126;
      --muted: #637178;
      --line: #d7e0e4;
      --accent: #185c78;
      --accent-2: #d88b24;
      --field: #f9fbfb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1220px;
      margin: 0 auto;
      padding: 14px 20px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 650;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 18px;
      max-width: 1220px;
      margin: 0 auto;
      padding: 18px 20px 24px;
    }

    aside,
    .plot-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    aside {
      padding: 14px;
    }

    .plot-wrap {
      min-width: 0;
      padding: 14px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    input[type="number"],
    select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      color: var(--ink);
      font: inherit;
      padding: 8px 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .inline input[type="number"] {
      flex: 0 0 88px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 520;
      text-transform: none;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }

    button {
      height: 36px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 650;
      padding: 0 12px;
      cursor: pointer;
    }

    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
    }

    .metrics,
    .samples {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .metrics dl {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px 12px;
      margin: 0;
      font-size: 13px;
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      font-variant-numeric: tabular-nums;
    }

    h2 {
      margin: 0 0 9px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 6px 4px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    .canvas-row {
      display: grid;
      grid-template-columns: minmax(280px, 680px) 46px;
      gap: 12px;
      align-items: stretch;
      justify-content: center;
    }

    .canvas-shell {
      position: relative;
      width: min(100%, 680px);
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      background: #11151a;
    }

    #heatmap {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #colorbar {
      width: 34px;
      height: 100%;
      min-height: 280px;
      border: 1px solid var(--line);
    }

    .axis-x,
    .axis-y {
      position: absolute;
      color: #f4f7f8;
      font-size: 12px;
      text-shadow: 0 1px 3px #000;
      pointer-events: none;
    }

    .axis-x {
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
    }

    .axis-y {
      left: 8px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: left center;
    }

    .legend {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    .notice {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }

      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>Heatmap Interpolator</h1>
      <div class="status" id="datasetStatus">Loading cache</div>
    </div>
  </header>

  <main>
    <aside>
      <div class="controls">
        <label>
          Photon energy (keV)
          <div class="inline">
            <input id="energy" type="number" min="200" max="1000" step="1" value="662">
            <input id="energyRange" type="range" min="200" max="1000" step="1" value="662">
          </div>
        </label>

        <label>
          Theta (deg)
          <div class="inline">
            <input id="thetaNumber" type="number" min="0" max="90" step="0.1" value="45">
            <input id="theta" type="range" min="0" max="90" step="0.1" value="45">
          </div>
        </label>

        <label>
          Phi (deg)
          <div class="inline">
            <input id="phiNumber" type="number" min="0" max="90" step="0.1" value="0">
            <input id="phi" type="range" min="0" max="90" step="0.1" value="0">
          </div>
        </label>

        <label>
          Neighbors
          <input id="neighbors" type="number" min="1" max="12" step="1" value="4">
        </label>

        <label>
          Interpolation
          <select id="mode">
            <option value="hybrid" selected>Hybrid foreground OT</option>
            <option value="ot">Pure optimal transport</option>
            <option value="flow">Flow morph</option>
            <option value="blend">Intensity blend</option>
          </select>
        </label>

        <label class="toggle">
          <input id="logScale" type="checkbox" checked>
          Log color scale
        </label>

        <div class="actions">
          <button id="render">Render</button>
          <button class="secondary" id="reset">Reset</button>
        </div>
      </div>

      <div class="metrics">
        <h2>Timing</h2>
        <dl>
          <dt>interpolation</dt><dd id="interpMs">-</dd>
          <dt>request</dt><dd id="requestMs">-</dd>
          <dt>render</dt><dd id="renderMs">-</dd>
          <dt>range</dt><dd id="valueRange">-</dd>
        </dl>
      </div>

      <div class="samples">
        <h2>Contributors</h2>
        <table>
          <thead>
            <tr>
              <th>case</th>
              <th>E</th>
              <th>theta</th>
              <th>phi</th>
              <th>src</th>
              <th>w</th>
            </tr>
          </thead>
          <tbody id="contributors"></tbody>
        </table>
      </div>
    </aside>

    <section class="plot-wrap">
      <div class="canvas-row">
        <div class="canvas-shell">
          <canvas id="heatmap" width="360" height="360"></canvas>
          <div class="axis-x">x (mm)</div>
          <div class="axis-y">y (mm)</div>
        </div>
        <canvas id="colorbar" width="34" height="360"></canvas>
      </div>
      <div class="legend">
        <span>-25.5 mm</span>
        <span>density (counts / gamma / cm^2)</span>
        <span>25.5 mm</span>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>

  <script>
    const els = {
      energy: document.getElementById("energy"),
      energyRange: document.getElementById("energyRange"),
      theta: document.getElementById("theta"),
      thetaNumber: document.getElementById("thetaNumber"),
      phi: document.getElementById("phi"),
      phiNumber: document.getElementById("phiNumber"),
      neighbors: document.getElementById("neighbors"),
      mode: document.getElementById("mode"),
      logScale: document.getElementById("logScale"),
      render: document.getElementById("render"),
      reset: document.getElementById("reset"),
      heatmap: document.getElementById("heatmap"),
      colorbar: document.getElementById("colorbar"),
      datasetStatus: document.getElementById("datasetStatus"),
      interpMs: document.getElementById("interpMs"),
      requestMs: document.getElementById("requestMs"),
      renderMs: document.getElementById("renderMs"),
      valueRange: document.getElementById("valueRange"),
      contributors: document.getElementById("contributors"),
      notice: document.getElementById("notice"),
    };

    let metadata = null;
    let renderScheduled = false;
    let requestInFlight = false;
    let rerenderRequested = false;
    let lastIssuedQuery = "";

    function syncPair(range, number) {
      range.addEventListener("input", () => {
        number.value = range.value;
        queueLiveRender();
      });
      number.addEventListener("input", () => {
        range.value = number.value;
        queueLiveRender();
      });
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function colorMagma(t) {
      const stops = [
        [0.00, 0, 0, 4],
        [0.18, 42, 17, 92],
        [0.36, 121, 32, 110],
        [0.56, 196, 65, 91],
        [0.76, 249, 142, 60],
        [1.00, 252, 253, 191],
      ];
      t = clamp(t, 0, 1);
      for (let i = 0; i < stops.length - 1; i += 1) {
        const a = stops[i];
        const b = stops[i + 1];
        if (t >= a[0] && t <= b[0]) {
          const u = (t - a[0]) / (b[0] - a[0]);
          return [
            Math.round(a[1] + (b[1] - a[1]) * u),
            Math.round(a[2] + (b[2] - a[2]) * u),
            Math.round(a[3] + (b[3] - a[3]) * u),
          ];
        }
      }
      const last = stops[stops.length - 1];
      return [last[1], last[2], last[3]];
    }

    function dataBounds(values, logScale) {
      let min = Infinity;
      let max = -Infinity;
      for (const value of values) {
        if (!Number.isFinite(value)) continue;
        if (logScale && value <= 0) continue;
        const scaled = logScale ? Math.log10(value) : value;
        min = Math.min(min, scaled);
        max = Math.max(max, scaled);
      }
      if (!Number.isFinite(min) || !Number.isFinite(max) || min === max) {
        min = 0;
        max = 1;
      }
      return { min, max };
    }

    function renderColorbar(min, max, logScale) {
      const ctx = els.colorbar.getContext("2d");
      const width = els.colorbar.width;
      const height = els.colorbar.height;
      const image = ctx.createImageData(width, height);
      for (let y = 0; y < height; y += 1) {
        const t = 1 - y / Math.max(1, height - 1);
        const rgb = colorMagma(t);
        for (let x = 0; x < width; x += 1) {
          const p = (y * width + x) * 4;
          image.data[p] = rgb[0];
          image.data[p + 1] = rgb[1];
          image.data[p + 2] = rgb[2];
          image.data[p + 3] = 255;
        }
      }
      ctx.putImageData(image, 0, 0);
      els.valueRange.textContent = logScale
        ? `${(10 ** min).toPrecision(3)} - ${(10 ** max).toPrecision(3)}`
        : `${min.toPrecision(3)} - ${max.toPrecision(3)}`;
    }

    function renderCanvas(values, width, height) {
      const start = performance.now();
      const ctx = els.heatmap.getContext("2d");
      if (els.heatmap.width !== width || els.heatmap.height !== height) {
        els.heatmap.width = width;
        els.heatmap.height = height;
      }
      const logScale = els.logScale.checked;
      const bounds = dataBounds(values, logScale);
      const span = bounds.max - bounds.min || 1;
      const image = ctx.createImageData(width, height);
      for (let row = 0; row < height; row += 1) {
        const sourceY = height - 1 - row;
        for (let col = 0; col < width; col += 1) {
          const value = values[col * height + sourceY];
          const scaled = logScale ? (value > 0 ? Math.log10(value) : bounds.min) : value;
          const t = (scaled - bounds.min) / span;
          const rgb = colorMagma(t);
          const p = (row * width + col) * 4;
          image.data[p] = rgb[0];
          image.data[p + 1] = rgb[1];
          image.data[p + 2] = rgb[2];
          image.data[p + 3] = 255;
        }
      }
      ctx.putImageData(image, 0, 0);
      renderColorbar(bounds.min, bounds.max, logScale);
      els.renderMs.textContent = `${(performance.now() - start).toFixed(1)} ms`;
    }

    function renderContributors(contributors) {
      els.contributors.innerHTML = "";
      for (const item of contributors) {
        const row = document.createElement("tr");
        const source = `${item.source_type || "unknown"} ${item.source_bins ? item.source_bins.join("x") : ""}`;
        row.innerHTML = `
          <td>${item.case_label}</td>
          <td>${item.energy_kev.toFixed(0)}</td>
          <td>${item.theta_deg.toFixed(1)}</td>
          <td>${item.phi_deg.toFixed(1)}</td>
          <td>${source}</td>
          <td>${item.weight.toFixed(2)}</td>
        `;
        els.contributors.appendChild(row);
      }
    }

    function query() {
      const energy = Number(els.energy.value);
      const theta = Number(els.theta.value);
      const phi = Number(els.phi.value);
      const k = Math.max(1, Math.min(12, Number(els.neighbors.value || 4)));
      const mode = els.mode.value;
      return new URLSearchParams({
        energy: String(energy),
        theta: String(theta),
        phi: String(phi),
        k: String(k),
        mode,
      });
    }

    async function updateHeatmap() {
      const params = query();
      const queryText = params.toString();
      lastIssuedQuery = queryText;
      const requestStart = performance.now();
      try {
        const response = await fetch(`/api/interpolate?${queryText}`, {
          headers: { "Accept": "application/octet-stream" },
        });
        if (!response.ok) throw new Error(await response.text());
        const buffer = await response.arrayBuffer();
        if (queryText !== lastIssuedQuery && rerenderRequested) return;
        const requestMs = performance.now() - requestStart;
        const shape = response.headers.get("X-Shape").split("x").map(Number);
        const contributors = JSON.parse(response.headers.get("X-Contributors") || "[]");
        const exact = response.headers.get("X-Exact-Match") === "1";
        const mode = response.headers.get("X-Mode") || "blend";
        els.interpMs.textContent = `${Number(response.headers.get("X-Interp-Ms")).toFixed(3)} ms`;
        els.requestMs.textContent = `${requestMs.toFixed(1)} ms`;
        renderContributors(contributors);
        renderCanvas(new Float32Array(buffer), shape[0], shape[1]);
        const modeLabel =
          mode === "hybrid" ? "Hybrid foreground-OT"
          : mode === "ot" ? "Pure optimal-transport"
          : mode === "flow" ? "Flow-morphed"
          : "Intensity-blended";
        els.notice.textContent = exact ? `Exact cached heatmap (${mode})` : `${modeLabel} from nearest cached heatmaps`;
      } catch (error) {
        els.notice.textContent = error.message;
      }
    }

    function queueLiveRender() {
      rerenderRequested = true;
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(runLiveRender);
    }

    async function runLiveRender() {
      renderScheduled = false;
      if (requestInFlight) return;
      requestInFlight = true;
      rerenderRequested = false;
      try {
        await updateHeatmap();
      } finally {
        requestInFlight = false;
        if (rerenderRequested) queueLiveRender();
      }
    }

    async function loadMetadata() {
      const response = await fetch("/api/metadata");
      metadata = await response.json();
      const energies = metadata.samples.map((s) => s.energy_kev);
      const theta = metadata.samples.map((s) => s.theta_deg);
      const phi = metadata.samples.map((s) => s.phi_deg);
      const energyMin = Math.floor(Math.min(...energies));
      const energyMax = Math.ceil(Math.max(...energies));
      els.energy.min = String(energyMin);
      els.energy.max = String(energyMax);
      els.energyRange.min = String(energyMin);
      els.energyRange.max = String(energyMax);
      els.datasetStatus.textContent =
        `${metadata.sample_count} samples, E ${Math.min(...energies).toFixed(0)}-${Math.max(...energies).toFixed(0)} keV, ` +
        `theta ${Math.min(...theta).toFixed(0)}-${Math.max(...theta).toFixed(0)} deg, ` +
        `phi ${Math.min(...phi).toFixed(0)}-${Math.max(...phi).toFixed(0)} deg, ` +
        `${metadata.has_ot_fields ? "OT ready" : "OT unavailable"}, ` +
        `${metadata.has_flow_fields ? "flow ready" : "flow unavailable"}`;
    }

    syncPair(els.energyRange, els.energy);
    syncPair(els.theta, els.thetaNumber);
    syncPair(els.phi, els.phiNumber);
    for (const input of [els.neighbors, els.mode, els.logScale]) {
      input.addEventListener("input", queueLiveRender);
      input.addEventListener("change", queueLiveRender);
    }
    els.render.addEventListener("click", queueLiveRender);
    els.reset.addEventListener("click", () => {
      els.energy.value = "662";
      els.energyRange.value = "662";
      els.theta.value = "45";
      els.thetaNumber.value = "45";
      els.phi.value = "0";
      els.phiNumber.value = "0";
      els.neighbors.value = "4";
      els.mode.value = "hybrid";
      els.logScale.checked = true;
      queueLiveRender();
    });

    loadMetadata().then(queueLiveRender);
  </script>
</body>
</html>
